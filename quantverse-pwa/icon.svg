<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#060e20"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="#bcc7de" stroke-width="10" opacity="0.45"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="116" fill="none" stroke="#bcc7de" stroke-width="10" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="58"  fill="none" stroke="#bcc7de" stroke-width="10"/>

  <!-- Bold green accent arc — upper sweep (matching header logo mark) -->
  <path d="M 97 172 A 178 178 0 0 1 415 172"
        fill="none" stroke="#4ae176" stroke-width="30" stroke-linecap="round"/>

  <!-- Quant · Verse wordmark at bottom -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Manrope, Arial, sans-serif" font-size="48" font-weight="800"
        letter-spacing="2">
    <tspan fill="#4ae176">Quant</tspan><tspan fill="#4ae176">•</tspan><tspan fill="#ffffff">Verse</tspan>
  </text>
</svg>
